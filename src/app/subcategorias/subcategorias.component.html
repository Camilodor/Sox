<app-nav></app-nav>
<div class="d-flex">
  <app-vertical-nav></app-vertical-nav>
  
  <div class="container mt-5">
    <table class="table table-bordered table-striped tabla-estilizada">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let subcategoria of subcategorias">
          <td>{{ subcategoria.id }}</td>
          <td>{{ subcategoria.nombre }}</td>
          <td>
            <button class="btn btn-warning me-2" data-bs-toggle="modal" data-bs-target="#editModal" (click)="abrirFormularioEditar(subcategoria)">
              <i class="fa fa-pencil-alt"></i>
            </button>
            <button class="btn btn-danger me-2" (click)="eliminarSubcategoria(subcategoria.id)">
              <i class="fa fa-trash"></i>
            </button>
            <button class="btn btn-info" (click)="consultarSubcategoria(subcategoria.id)">
              <i class="fa fa-eye"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="d-flex justify-content-center gap-3 mt-3">
      <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#createModal">Crear Subcategoría</button>
      <button class="btn btn-custom" (click)="guardarCambios()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal para crear una subcategoría -->
<div class="modal fade" id="createModal" tabindex="-1" aria-labelledby="createModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createModalLabel">Crear Subcategoría</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ingrese el nombre" />
          </div>
          <div class="mb-3">
            <label for="idCategoria" class="form-label">ID Categoría</label>
            <input type="text" class="form-control" id="idCategoria" placeholder="Ingrese el ID de la categoría" />
          </div>
          <div class="mb-3">
            <label for="nombreCategoria" class="form-label">Nombre Categoría</label>
            <input type="text" class="form-control" id="nombreCategoria" placeholder="Ingrese el nombre de la categoría" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Crear Subcategoría</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal para editar una subcategoría -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Editar Subcategoría</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="editNombre" class="form-label">Editar Nombre</label>
            <input type="text" class="form-control" id="editNombre" [value]="subcategoriaSeleccionada.nombre" readonly />
          </div>
          <div class="mb-3">
            <label for="editIdCategoria" class="form-label">Editar ID Categoría</label>
            <input type="text" class="form-control" id="editIdCategoria" [value]="subcategoriaSeleccionada.idCategoria" readonly />
          </div>
          <div class="mb-3">
            <label for="editNombreCategoria" class="form-label">Editar Nombre Categoría</label>
            <input type="text" class="form-control" id="editNombreCategoria" [value]="subcategoriaSeleccionada.nombreCategoria" readonly />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>
