<app-nav></app-nav>
<div class="d-flex">
  <app-vertical-nav></app-vertical-nav>

  <div class="container mt-5">
    <table class="table table-bordered table-striped tabla-estilizada">
      <thead>
        <tr>
          <th>ID</th>
          <th>Placa</th>
          <th>Peso Máximo</th>
          <th>Color</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let vehiculo of vehiculos">
          <td>{{ vehiculo.id }}</td>
          <td>{{ vehiculo.placa }}</td>
          <td>{{ vehiculo.pesomaximo }}</td>
          <td>{{ vehiculo.color }}</td>
          <td>
            <button class="btn btn-warning me-2" data-bs-toggle="modal" data-bs-target="#editModal" (click)="abrirFormularioEditar(vehiculo)">
              <i class="fa fa-pencil-alt"></i>
            </button>
            <button class="btn btn-danger me-2" (click)="eliminarVehiculo(vehiculo.id)">
              <i class="fa fa-trash"></i>
            </button>
            <button class="btn btn-info" (click)="consultarVehiculo(vehiculo.id)">
              <i class="fa fa-eye"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="d-flex justify-content-center gap-3 mt-3">
      <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#createModal">Crear Vehículo</button>
      <button class="btn btn-custom" (click)="guardarCambios()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal para crear un vehículo -->
<div
  class="modal fade"
  id="createModal"
  tabindex="-1"
  aria-labelledby="createModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createModalLabel">Crear Vehículo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="placa" class="form-label">Placa</label>
            <input type="text" class="form-control" id="placa" placeholder="Ingrese la placa" />
          </div>
          <div class="mb-3">
            <label for="pesoMaximo" class="form-label">Peso Máximo</label>
            <input type="text" class="form-control" id="pesoMaximo" placeholder="Ingrese el peso máximo" />
          </div>
          <div class="mb-3">
            <label for="color" class="form-label">Color</label>
            <input type="text" class="form-control" id="color" placeholder="Ingrese el color" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Crear Vehículo</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal para editar un vehículo -->
<div
  class="modal fade"
  id="editModal"
  tabindex="-1"
  aria-labelledby="editModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Editar Vehículo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="editPlaca" class="form-label">Editar Placa</label>
            <input type="text" class="form-control" id="editPlaca" [value]="vehiculoSeleccionado.placa" readonly />
          </div>
          <div class="mb-3">
            <label for="editPesoMaximo" class="form-label">Editar Peso Máximo</label>
            <input type="text" class="form-control" id="editPesoMaximo" [value]="vehiculoSeleccionado.pesoMaximo" readonly />
          </div>
          <div class="mb-3">
            <label for="editColor" class="form-label">Editar Color</label>
            <input type="text" class="form-control" id="editColor" [value]="vehiculoSeleccionado.color" readonly />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>
